<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вращающаяся 3D-модель — стеклянная Струя.glb</title>
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
    ></script>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(255, 255, 255, 0.08);
        --line: rgba(255, 255, 255, 0.16);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.62);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(
            circle at 24% 18%,
            rgba(111, 197, 255, 0.28),
            transparent 34%
          ),
          radial-gradient(
            circle at 78% 18%,
            rgba(195, 126, 255, 0.24),
            transparent 30%
          ),
          linear-gradient(135deg, #080b12 0%, #101725 46%, #05070c 100%);
        color: var(--text);
        overflow: hidden;
      }
      .page {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100vh;
        padding: clamp(16px, 3vw, 36px);
        gap: 16px;
      }
      header,
      footer {
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      header {
        pointer-events: auto;
      }
      footer {
        pointer-events: auto;
      }
      .badge,
      .hint {
        border: 1px solid var(--line);
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.25);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 14px;
        color: var(--muted);
      }
      .toggle-rotate {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      .toggle-rotate:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .model-select {
        border: 1px solid var(--line);
        background: var(--panel);
        color: #ffffff;
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      .model-select option {
        color: #ffffff;
        background: #121826;
      }
      .model-select:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      h1 {
        margin: 0;
        font-size: clamp(22px, 4vw, 44px);
        letter-spacing: -0.04em;
        line-height: 1;
        text-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
      }
      .viewer-wrap {
        position: relative;
        min-height: 0;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.045);
        border-radius: 32px;
        overflow: hidden;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.09),
          0 30px 110px rgba(0, 0, 0, 0.38);
      }
      model-viewer {
        width: 100%;
        height: 100%;
        min-height: 64vh;
        --poster-color: transparent;
        background: transparent;
      }
      .glow {
        position: absolute;
        inset: auto 18% -25% 18%;
        height: 42%;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(120, 205, 255, 0.24),
          transparent 70%
        );
        filter: blur(18px);
        pointer-events: none;
      }
      @media (max-width: 720px) {
        header,
        footer {
          align-items: flex-start;
          flex-direction: column;
        }
        .hint {
          border-radius: 18px;
        }
        .viewer-wrap {
          border-radius: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <h1 id="model-title">Стеклянная струя</h1>
        <select
          id="model-select"
          class="model-select"
          aria-label="Выбор модели"
        ></select>
      </header>

      <section class="viewer-wrap" aria-label="3D viewer">
        <div class="glow"></div>
        <model-viewer
          id="glass-model-viewer"
          alt="3D-модель"
          camera-controls
          auto-rotate
          auto-rotate-delay="0"
          rotation-per-second="14deg"
          interaction-prompt="none"
          shadow-intensity="0.75"
          exposure="1.15"
          environment-image="neutral"
          camera-orbit="0deg 70deg auto"
          field-of-view="35deg"
        >
        </model-viewer>
      </section>

      <footer>
        <div class="hint">
          Можно крутить мышью, приближать колесом или жестом pinch.
        </div>
        <button id="rotate-toggle" class="toggle-rotate" type="button">
          Выключить вращение
        </button>
      </footer>
    </main>
    <script>
      const DEFAULT_MODEL_KEY = "streamOne";
      const MODEL_ENTRIES = {
        streamOne: {
          label: "Стеклянная струя",
          modelPath: "Струя.glb",
        },
        baths: {
          label: "Ванны",
          modelPath: "Ванны.glb",
        },
        gallery: {
          label: "Галерея",
          modelPath: "Галерея.glb",
        },
        temple: {
          label: "Храм",
          modelPath: "Храм.glb",
        },
      };

      const viewer = document.getElementById("glass-model-viewer");
      const titleElement = document.getElementById("model-title");
      const modelSelect = document.getElementById("model-select");
      const rotateToggle = document.getElementById("rotate-toggle");

      const MODELS = MODEL_ENTRIES;
      const ACTIVE_DEFAULT_MODEL_KEY = MODELS[DEFAULT_MODEL_KEY]
        ? DEFAULT_MODEL_KEY
        : Object.keys(MODELS)[0];

      const resolveModelSrc = (model) => {
        if (!model) {
          return "";
        }
        const canUseFilePath =
          typeof model.modelPath === "string" && model.modelPath.length > 0;
        if (canUseFilePath) {
          return encodeURI(model.modelPath);
        }
        return "";
      };

      const applyModelByKey = (modelKey) => {
        if (!viewer) {
          return;
        }
        const nextModel = MODELS[modelKey];
        if (!nextModel) {
          return;
        }
        viewer.src = resolveModelSrc(nextModel);
        if (titleElement) {
          titleElement.textContent = nextModel.label;
        }
      };

      if (modelSelect) {
        for (const [modelKey, model] of Object.entries(MODELS)) {
          const option = document.createElement("option");
          option.value = modelKey;
          option.textContent = model.label;
          modelSelect.append(option);
        }
        modelSelect.value = ACTIVE_DEFAULT_MODEL_KEY;
        modelSelect.addEventListener("change", () => {
          applyModelByKey(modelSelect.value);
        });
      }

      if (viewer) {
        applyModelByKey(ACTIVE_DEFAULT_MODEL_KEY);
      }
      if (viewer && rotateToggle) {
        const updateRotateButton = () => {
          const isAutoRotateEnabled = viewer.hasAttribute("auto-rotate");
          rotateToggle.textContent = isAutoRotateEnabled
            ? "Выключить вращение"
            : "Включить вращение";
          rotateToggle.setAttribute(
            "aria-pressed",
            String(isAutoRotateEnabled),
          );
        };

        rotateToggle.addEventListener("click", () => {
          if (viewer.hasAttribute("auto-rotate")) {
            viewer.removeAttribute("auto-rotate");
          } else {
            viewer.setAttribute("auto-rotate", "");
          }
          updateRotateButton();
        });

        updateRotateButton();
      }
    </script>
  </body>
</html>
